# Expertise panels
[[extra.expertise]]
title = "Hiring as a System, Not a Hustle"
text = "Most recruiting teams run on muscle memory and tribal knowledge. I design the operating system underneath: structured scorecards, calibrated evaluation loops, intake rigor, governance. The goal is that a great hiring decision doesn't depend on which interviewer had coffee that morning."

[[extra.expertise]]
title = "Founder-Level Talent Advisory"
text = "I sit in the room where org design happens — not waiting for a req to land. Capability gaps, hiring sequencing, leadership profiles, comp philosophy. The question isn't 'who do we hire?' — it's 'what bet are we making, and who makes it succeed?'"

[[extra.expertise]]
title = "If It Repeats, I Automate It"
text = "Interview evaluators, offer page generators, candidate research agents, prompt governance, API usage dashboards — I build these because I got tired of watching my team do the same judgment call 200 times with no system backing them up. Most of these are internal. Some escaped into open source."

